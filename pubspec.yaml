name: campus_move
description: Campus Move – Transport Management System for COMSATS Sahiwal
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  firebase_database: ^11.1.0
  firebase_storage: ^12.3.0

  # UI & State
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0

  # Media & Files
  image_picker: ^1.1.2
  file_picker: ^8.1.0
  url_launcher: ^6.3.1

  # QR & Scanner
  qr_flutter: ^4.1.0
  mobile_scanner: ^7.0.1

  # Notifications
  flutter_local_notifications: ^18.0.1

  # PDF & Charts
  printing: ^5.13.0
  pdf: ^3.10.7
  fl_chart: ^0.69.0

  # HTTP (for Ntfy SOS notifications)
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/comsats_logo.png
    - assets/dev1.PNG
    - assets/dev2.jpeg
    - assets/dev3.jpeg
    - assets/bus_bg.jpg